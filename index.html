<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TipFlow — Fan Gifts. Zero Fees.</title>
    <meta name="description" content="TipFlow lets fans fund the gear, software, and essentials creators actually need — with zero platform fees." />
    <meta name="theme-color" content="#111111" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TipFlow — Fan Gifts. Zero Fees." />
    <meta property="og:description" content="TipFlow lets fans fund the gear, software, and essentials creators actually need — with zero platform fees." />
    <meta property="og:site_name" content="TipFlow" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TipFlow — Fan Gifts. Zero Fees." />
    <meta name="twitter:description" content="TipFlow lets fans fund the gear, software, and essentials creators actually need." />

    <!-- Prevent FOUC for dark mode -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('tipflow-theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
