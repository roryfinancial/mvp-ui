<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rory — Fan Gifts. Low Fees.</title>
    <meta name="description" content="Rory lets creators set goals for their projects and fans donate to help achieve them — with low platform fees." />
    <meta name="theme-color" content="#111111" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rory — Fan Gifts. Low Fees." />
    <meta property="og:description" content="Rory lets creators set goals for their projects and fans donate to help achieve them — with low platform fees." />
    <meta property="og:site_name" content="Rory" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rory — Fan Gifts. Low Fees." />
    <meta name="twitter:description" content="Rory lets creators set goals for their projects and fans donate to help achieve them." />

    <!-- Prevent FOUC for dark mode -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('rory-theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
