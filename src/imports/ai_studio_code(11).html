<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Profile: [Creator Name] - WishCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons (Search, User, Arrow-up for project) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: {
                            800: '#1e1e24', // Main container background
                            900: '#1e1e24', // Lighter dark-gray, consistent
                            950: '#121217', // Deep charcoal body background
                        },
                        accent: {
                            DEFAULT: '#8b5cf6', // Vibrant violet
                            hover: '#7c3aed',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Import Inter font from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-charcoal-950 text-gray-300 antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Main Creator Profile Container -->
    <div class="w-full max-w-4xl mx-auto bg-charcoal-800 rounded-xl shadow-2xl overflow-hidden p-6 md:p-8">
        
        <!-- Top Section: Creator Name, Logo, Search -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 mb-8 pb-6 border-b border-white/10">
            
            <!-- Creator Logo & Name -->
            <div class="flex-1 flex items-center gap-4 text-center sm:text-left">
                <!-- Logo Placeholder (Square, as per sketch) -->
                <div class="w-16 h-16 rounded-md bg-white/5 flex items-center justify-center text-gray-400 text-3xl">
                    <i class="fa-solid fa-cube"></i> <!-- Generic icon for a brand/logo -->
                </div>
                <!-- Creator Name -->
                <h1 class="text-3xl font-extrabold text-white">Creator Name</h1>
            </div>

            <!-- Search Bar -->
            <div class="relative flex items-center w-full sm:w-64 mt-4 sm:mt-0">
                <input type="text" placeholder="Search"
                       class="w-full p-2 pl-9 rounded-md bg-charcoal-950 border border-white/10 focus:outline-none focus:ring-1 focus:ring-accent text-white placeholder-gray-500 text-sm transition-colors duration-200"
                       aria-label="Search">
                <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-500 text-sm"></i>
            </div>
        </div>

        <!-- Bottom Section: Leading Supporters & Projects -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Left Column: Leading Supporters -->
            <div>
                <h2 class="text-xl font-semibold text-white mb-4">Leading Supporters:</h2>
                <ul class="space-y-3">
                    <!-- Supporter 1 -->
                    <li class="w-full h-10 bg-white/5 rounded-md flex items-center px-4 text-gray-400 text-sm">
                        <div class="w-4 h-4 rounded-full bg-gray-600 mr-3 flex-shrink-0"></div> <!-- Avatar/Bullet Placeholder -->
                        Supporter Name 1
                    </li>
                    <!-- Supporter 2 -->
                    <li class="w-full h-10 bg-white/5 rounded-md flex items-center px-4 text-gray-400 text-sm">
                        <div class="w-4 h-4 rounded-full bg-gray-600 mr-3 flex-shrink-0"></div> <!-- Avatar/Bullet Placeholder -->
                        Supporter Name 2
                    </li>
                    <!-- Supporter 3 -->
                    <li class="w-full h-10 bg-white/5 rounded-md flex items-center px-4 text-gray-400 text-sm">
                        <div class="w-4 h-4 rounded-full bg-gray-600 mr-3 flex-shrink-0"></div> <!-- Avatar/Bullet Placeholder -->
                        Supporter Name 3
                    </li>
                    <!-- More Supporters indicated by ellipses in sketch -->
                    <li class="text-center text-gray-500 text-sm pt-2">...</li>
                </ul>
            </div>

            <!-- Right Column: Projects -->
            <div>
                <h2 class="text-xl font-semibold text-white mb-4">Projects</h2>
                <div class="space-y-4">
                    <!-- Project Card Placeholder 1 (Standard) -->
                    <div class="bg-white/5 rounded-md p-3 flex items-center gap-3 border border-white/10">
                        <div class="w-20 h-16 bg-gray-600 rounded-sm flex-shrink-0"></div> <!-- Image Placeholder -->
                        <div class="flex-grow space-y-1">
                            <div class="w-4/5 h-4 bg-gray-500 rounded"></div> <!-- Project Title -->
                            <div class="w-2/3 h-3 bg-gray-600 rounded"></div> <!-- Project Description Line -->
                        </div>
                    </div>
                    <!-- Project Card Placeholder 2 (with "Up Arrow" indicating featured/ongoing) -->
                    <div class="bg-white/5 rounded-md p-3 flex items-center gap-3 border border-white/10">
                        <div class="w-20 h-16 bg-gray-600 rounded-sm flex-shrink-0 flex items-center justify-center text-gray-400 text-2xl">
                            <i class="fa-solid fa-arrow-up"></i>
                        </div> <!-- Image Placeholder with up arrow -->
                        <div class="flex-grow space-y-1">
                            <div class="w-3/4 h-4 bg-gray-500 rounded"></div> <!-- Project Title -->
                            <div class="w-1/2 h-3 bg-gray-600 rounded"></div> <!-- Project Description Line -->
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
